name: Build Revenant Kernel

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build'
        required: true
        default: 'base'
        type: choice
        options:
          - base   # Beta-v1.0
          - perf   # Beta-v1.1
          - rasp   # Beta-v1.2
          - full   # Beta-v1.3
      release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

env:
  KMI_BRANCH: common-android15-6.6
  KMI_TAG: android15-6.6.127_r00
  KSU_NEXT_REF: v3.2.0
  SUSFS_REF: gki-android15-6.6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex libssl-dev make gcc \
            libelf-dev build-essential python3 python3-pip \
            zip unzip rsync cpio ccache lz4 zstd perl xz-utils
          mkdir -p "$HOME/bin"
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "ci"
          git config --global user.email "ci@local"

      - name: Sync AOSP common kernel manifest
        run: |
          mkdir -p ws && cd ws
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest \
            -b ${{ env.KMI_BRANCH }} -m default.xml
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --fail-fast

      - name: Pin common/ to Linux 6.6.127 commit
        run: |
          cd ws/common
          git fetch https://android.googlesource.com/kernel/common.git \
            ${{ env.KMI_TAG }} --depth=1 || \
            git fetch https://android.googlesource.com/kernel/common.git \
              ${{ env.KMI_BRANCH }} --depth=1
          git checkout FETCH_HEAD
          head -6 Makefile

      - name: Clean dirty / scmversion markers
        run: |
          cd ws
          sed -i 's/-dirty//g' common/scripts/setlocalversion || true
          sed -i 's/ -dirty//g' common/scripts/setlocalversion || true
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' \
            build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true

      - name: Integrate KernelSU-Next ${{ env.KSU_NEXT_REF }}
        run: |
          cd ws/common
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${{ env.KSU_NEXT_REF }}/kernel/setup.sh" | bash -s ${{ env.KSU_NEXT_REF }}

      - name: Integrate SuSFS
        run: |
          cd ws
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b ${{ env.SUSFS_REF }} susfs
          cp -v susfs/kernel_patches/fs/* common/fs/
          cp -v susfs/kernel_patches/include/linux/* common/include/linux/
          cd common
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch \
            < ../susfs/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || true

      - name: Apply Revenant patches (RASP variants only)
        if: ${{ contains(fromJson('["rasp","full"]'), inputs.variant) }}
        run: |
          cd ws/common
          for p in ../../patches/*.patch; do
            echo "applying $(basename $p)"
            patch -p1 --fuzz=3 --forward --no-backup-if-mismatch < "$p" || true
          done

      - name: Apply config fragment
        run: |
          cp configs/revenant-${{ inputs.variant }}.fragment \
            ws/common/arch/arm64/configs/revenant.fragment
          cat ws/common/arch/arm64/configs/revenant.fragment

      - name: Build with full LTO/PGO/BOLT
        run: |
          cd ws
          tools/bazel run --lto=full \
            --defconfig_fragment=//common:arch/arm64/configs/revenant.fragment \
            //common:kernel_aarch64_dist 2>&1 | tail -50
          mkdir -p "$GITHUB_WORKSPACE/dist"
          IMG=$(find -L bazel-bin -name Image -path '*kernel_aarch64*' | head -1)
          test -n "$IMG"
          cp -v "$IMG" "$GITHUB_WORKSPACE/dist/Image"
          strings "$GITHUB_WORKSPACE/dist/Image" | grep "^Linux version" | head -1

      - name: Package AnyKernel3
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
          rm -rf ak3/.git ak3/README.md
          cat > ak3/anykernel.sh <<'EOF'
          ### AnyKernel3 — Revenant
          properties() { '
          kernel.string=Revenant
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=rodin
          device.name2=24129RT7CC
          supported.versions=15-16
          '; }
          block=auto;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          flash_dtbo;
          EOF
          cp dist/Image ak3/Image
          cd ak3
          zip -r9 "../Revenant-${{ inputs.variant }}-${{ github.run_number }}.zip" * -x .git
          cd ..
          ls -lh Revenant-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Revenant-${{ inputs.variant }}-${{ github.run_number }}
          path: |
            Revenant-*.zip
            dist/Image
          retention-days: 30

      - name: Create release
        if: ${{ inputs.release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Beta-v${{ inputs.variant == 'base' && '1.0' || inputs.variant == 'perf' && '1.1' || inputs.variant == 'rasp' && '1.2' || '1.3' }}
          name: Revenant ${{ inputs.variant }}
          body: |
            Build #${{ github.run_number }}
            Variant: `${{ inputs.variant }}`
            Base: Linux 6.6.127 `android15-8-4k`
            KernelSU-Next ${{ env.KSU_NEXT_REF }} + SuSFS
          files: Revenant-*.zip
          prerelease: true
