name: Build Revenant Kernel

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

env:
  KMI_BRANCH: common-android15-6.6
  KMI_TAG: android15-6.6.127_r00
  KSU_OWNER: KernelSU-Next
  KSU_REPO: KernelSU-Next
  # commit hash do KSU-Next "source: sync with upstream" (13/Mai/2026)
  # Kbuild hash fd31bb51 bate com base do patch cctv18 10_enable_susfs_for_ksu.patch
  KSU_COMMIT: 1d919700e46568436b993b57d3a8e3a3fd7f27b6
  # v1.3: revert simonpunk → cctv18 (simonpunk patches rejected em KSU-Next 1d919700,
  # gerou ksu_lsm_hook_init undeclared no build). cctv18 fork foi feito PRA KSU-Next.
  # Os "hooks extras invasivos" do cctv18 (sdcard_monitor etc) NAO sao causa do bootloop —
  # causa real é module loader sem patch "load anyway" (claim 3 da auditoria, confirmado
  # via strings binarias EVONIX vs Revenant). Fix: aplicar patch no module loader em
  # step dedicado (proxima sessao).
  SUSFS_OWNER: cctv18
  SUSFS_REPO: susfs4oki
  SUSFS_BRANCH: oki-android15-6.6
  SUSFS_HOST: github.com
  KSU_VERSION_FORCED: 33150

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Setup 10GB swap (LTO needs RAM)
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 10

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex libssl-dev make gcc \
            libelf-dev build-essential python3 python3-pip \
            zip unzip rsync cpio ccache lz4 zstd perl xz-utils
          mkdir -p "$HOME/bin"
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "ci"
          git config --global user.email "ci@local"

      - name: Sync AOSP manifest
        run: |
          mkdir -p ws && cd ws
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest \
            -b ${{ env.KMI_BRANCH }} -m default.xml
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --fail-fast

      - name: Pin common/ to ${{ env.KMI_TAG }}
        run: |
          cd ws/common
          git fetch https://android.googlesource.com/kernel/common.git \
            tag ${{ env.KMI_TAG }} --depth=1
          git checkout ${{ env.KMI_TAG }}
          head -5 Makefile
          grep KMI_GENERATION build.config.common

      - name: Clean scmversion dirty markers
        run: |
          cd ws
          sed -i 's/-dirty//g; s/ -dirty//g' common/scripts/setlocalversion
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' \
            build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true

      - name: Empty GKI KMI symbol filter (v1.2 FIX bootloop)
        run: |
          cd ws/common
          # simonpunk README item 11: "necessary to delete abi_gki_protected_exports_aarch64,
          # otherwise some modules like WiFi will not work"
          # MAS BUILD.bazel referencia esse arquivo → deletar quebra build.
          # Solução: TRUNCAR pra zero bytes → arquivo existe (Bazel feliz)
          # mas SEM symbols filtrados → kernel exporta TUDO → vendor modules OK
          : > android/abi_gki_protected_exports_aarch64
          : > android/abi_gki_protected_exports_x86_64
          echo "[+] Protected exports filter EMPTIED — kernel exports unrestricted"
          ls -lh android/abi_gki_protected_exports_*

      - name: Clone KernelSU-Next at commit ${{ env.KSU_COMMIT }}
        run: |
          cd ws
          git clone https://github.com/${{ env.KSU_OWNER }}/${{ env.KSU_REPO }}.git KernelSU-Next
          cd KernelSU-Next
          git checkout ${{ env.KSU_COMMIT }}
          echo "[+] KSU at $(git rev-parse --short HEAD): $(git log -1 --pretty=%s)"

      - name: Clone ${{ env.SUSFS_OWNER }}/${{ env.SUSFS_REPO }} ${{ env.SUSFS_BRANCH }}
        run: |
          cd ws
          git clone --depth=1 -b ${{ env.SUSFS_BRANCH }} \
            https://${{ env.SUSFS_HOST }}/${{ env.SUSFS_OWNER }}/${{ env.SUSFS_REPO }}.git susfs
          ls susfs/kernel_patches/

      - name: Copy SuSFS source files BEFORE patch
        run: |
          cd ws/common
          cp -v ../susfs/kernel_patches/fs/susfs.c fs/
          cp -v ../susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp -v ../susfs/kernel_patches/include/linux/susfs_def.h include/linux/
          echo "[+] SuSFS source files copied"

      - name: Apply cctv18 SuSFS kernel patch to common/ (FAIL on .rej except SUS_MAP)
        run: |
          cd ws/common
          # SUS_MAP hunk em fs/proc/task_mmu.c esperado falhar (1 hunk).
          # Outros .rej = FAIL build (auditor claim 5).
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch \
            < ../susfs/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || true
          # Strict check: tolerar ONLY task_mmu.c.rej (SUS_MAP)
          REJ=$(find . -name "*.rej" | grep -v "task_mmu.c.rej" || true)
          if [ -n "$REJ" ]; then
            echo "[FAIL] Unexpected .rej files:"
            echo "$REJ"
            for f in $REJ; do echo "=== $f ==="; cat "$f"; done
            exit 1
          fi
          echo "[+] SuSFS kernel patch applied (only SUS_MAP rejected — OK)"

      - name: Apply cctv18 KSU patch to KSU source (STRICT — fail on any .rej)
        run: |
          cd ws/KernelSU-Next
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch \
            < ../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
          # Auditor claim 5: NEVER tolerate KSU patch failures — gera undefined symbols
          if find . -name "*.rej" -print -quit | grep -q .; then
            echo "[FAIL] KSU patch had rejects:"
            find . -name "*.rej" -exec sh -c 'echo "=== $1 ==="; cat "$1"' _ {} \;
            exit 1
          fi
          echo "[+] KSU SuSFS patch applied clean"
          grep -q "^config KSU_SUSFS$" kernel/Kconfig || { echo "[FAIL] CONFIG_KSU_SUSFS missing"; exit 1; }

      - name: Patch module loader (load_anyway on CRC/vermagic mismatch) — v1.3 ROOT FIX
        run: |
          cd ws/common
          # Auditor claim 3: EVONIX binary tem "load anyway" + "loading anyway" strings,
          # Revenant nao. Confirma EVONIX tem patch que downgrada module load ERROR → WARN.
          # Esse patch é o que permite EVONIX (6.6.127) carregar rodin vendor_dlkm modules
          # (6.6.89) apesar de CRC mismatch. MODULE_FORCE_LOAD=y sozinho nao basta porque
          # Android init nao passa --force flag pra modprobe.
          #
          # Patch:
          # 1. kernel/module/version.c::check_version() — retornar 1 (load) ao inves de 0 (reject)
          #    quando CRC mismatch + adicionar "load anyway" no print
          # 2. kernel/module/main.c::check_modinfo() — vermagic mismatch nao retorna ENOEXEC

          # version.c: trocar return 0 dentro de check_version (apos disagrees print)
          sed -i.bak '
          /int check_version/,/^}/ {
              s|pr_warn("%s: disagrees about version of symbol %s\\n",|pr_warn("%s: disagrees about version of symbol, load anyway %s\\n",|
              s|return 0;|return 1; /* v1.3 force load */|
          }' kernel/module/version.c

          # main.c: vermagic mismatch warning + continue
          # Looking for: if (!same_magic(modmagic, vermagic, ...)) { error; return -ENOEXEC; }
          # Change to: just warn + continue
          if grep -q "version magic.*should be" kernel/module/main.c; then
            sed -i.bak '
            /if (!same_magic(modmagic, vermagic/,/return -ENOEXEC;/ {
                s|pr_err("%s: version magic|pr_warn("%s: version magic|
                s|should be \x27%s\x27"|should be \x27%s\x27, loading anyway"|
                s|return -ENOEXEC;|/* v1.3 load anyway */|
            }' kernel/module/main.c
          fi

          # Verify patches applied
          echo "===check version.c==="
          grep -A1 "disagrees about version" kernel/module/version.c | head -4
          echo "===check main.c==="
          grep -B1 -A2 "version magic" kernel/module/main.c | head -10
          echo "[+] Module loader patched: vendor modules loadable apesar de CRC/vermagic mismatch"

      - name: Override Kbuild hardcoded values (KSU_VERSION fallback + Manager hash)
        run: |
          cd ws/KernelSU-Next
          # Patch cctv18 hardcoded KSU_VERSION=16 fallback (sandbox loses .git) + weishu manager hash
          # Trocar pelos valores corretos:
          #   KSU_VERSION = 33150 (passa manager check 33110)
          #   EXPECTED_HASH = 79e590113c... (KSU-Next oficial — kwlkkw manager bate)
          #   EXPECTED_SIZE = 0x3e6 (KSU-Next manager APK size)
          sed -i 's|ccflags-y += -DKSU_VERSION=16|ccflags-y += -DKSU_VERSION=${{ env.KSU_VERSION_FORCED }}|' kernel/Kbuild
          sed -i 's|KSU_EXPECTED_HASH := c371061b19d8c7d7d6133c6a9bafe198fa944e50c1b31c9d8daa8d7f1fc2d2d6|KSU_EXPECTED_HASH := 79e590113c4c4c0c222978e413a5faa801666957b1212a328e46c00c69821bf7|' kernel/Kbuild
          sed -i 's|KSU_EXPECTED_SIZE := 0x033b|KSU_EXPECTED_SIZE := 0x3e6|' kernel/Kbuild
          # cctv18 patch removeu KSU_VERSION_TAG — mas supercall/dispatch.c usa essa macro. Define manualmente:
          echo 'ccflags-y += -DKSU_VERSION_TAG=\"v3.2.0\"' >> kernel/Kbuild
          # Verificar
          echo "[+] KSU_VERSION fallback:"
          grep -n "KSU_VERSION=" kernel/Kbuild
          echo "[+] KSU_EXPECTED_HASH:"
          grep -n "KSU_EXPECTED_HASH :=" kernel/Kbuild
          echo "[+] KSU_EXPECTED_SIZE:"
          grep -n "KSU_EXPECTED_SIZE :=" kernel/Kbuild

      - name: Symlink KernelSU-Next into common/drivers
        run: |
          cd ws/common
          ln -sf ../../KernelSU-Next/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || \
            printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || \
            sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          echo "[+] KSU integrated"

      - name: Apply config fragment (no LOCALVERSION — kleaf handles -4k)
        run: |
          cp configs/revenant-base.fragment \
            ws/common/arch/arm64/configs/revenant.fragment
          # v1.1: NÃO setamos CONFIG_LOCALVERSION aqui — kleaf injeta `-android15-8`
          # via file_localversion e `--page_size=4k` injeta `-4k` via config_localversion
          # do arm64_4k_defconfig fragment. Setar CONFIG_LOCALVERSION aqui SOBRESCREVE
          # o -4k (fragment ordem: nosso → último → vence merge_config).
          # Resultado esperado: 6.6.127-android15-8-4k (igual EVONIX sem prefix branding)
          cat ws/common/arch/arm64/configs/revenant.fragment

      - name: Build kernel_aarch64 (thin LTO + page_size=4k)
        run: |
          cd ws
          # v1.1 CRITICAL: --page_size=4k garante CONFIG_LOCALVERSION="-4k" injection
          # via arm64_4k_defconfig fragment do kleaf.
          # --lto=thin pra evitar OOM (14GB runner + 10GB swap)
          tools/bazel build --lto=thin --page_size=4k \
            --defconfig_fragment=//common:arch/arm64/configs/revenant.fragment \
            //common:kernel_aarch64_dist
          mkdir -p "$GITHUB_WORKSPACE/dist"
          IMG=$(find -L bazel-bin -name Image -path '*kernel_aarch64*' | head -1)
          test -n "$IMG"
          cp -v "$IMG" "$GITHUB_WORKSPACE/dist/Image"
          echo "=== banner ==="
          strings "$GITHUB_WORKSPACE/dist/Image" | grep "^Linux version" | head -1
          echo "=== KSU + SuSFS strings ==="
          strings "$GITHUB_WORKSPACE/dist/Image" | grep -E "KSU_VERSION|SUSFS_VERSION|susfs is initialized" | head -3

      - name: Package AnyKernel3
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
          rm -rf ak3/.git ak3/README.md
          cat > ak3/anykernel.sh <<'EOF'
          ### AnyKernel3 — Revenant v1.3
          properties() { '
          kernel.string=Revenant Kernel v1.3 by Kaua
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          supported.versions=15-16
          '; }
          # rodin layout: kernel mora em /dev/block/by-name/boot
          # boot.img tem kernel_size>0 ramdisk_size=0; init_boot tem ramdisk separado
          # AnyKernel dump_boot chama unpack_ramdisk → abort se ramdisk_size=0
          # Fix: copiar logic EVONIX literal (auditor claim 2)
          block=boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          no_magisk_check=1;
          . tools/ak3-core.sh;
          if [ -L "/dev/block/bootdevice/by-name/init_boot_a" -o -L "/dev/block/by-name/init_boot_a" ]; then
              split_boot;
              flash_boot;
          else
              dump_boot;
              write_boot;
          fi;
          EOF
          cp dist/Image ak3/Image
          cd ak3
          zip -r9 "../Revenant-Beta-v1.3-${{ github.run_number }}.zip" * -x .git
          cd ..
          ls -lh Revenant-Beta-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Revenant-Beta-v1.3-${{ github.run_number }}
          path: |
            Revenant-Beta-*.zip
            dist/Image
          retention-days: 30

      - name: Create release
        if: ${{ inputs.release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Beta-v1.3
          name: Revenant Beta v1.3
          body: |
            Build #${{ github.run_number }}
            Base: Linux 6.6.127 `android15-8-4k`
            KernelSU-Next + SuSFS v2.1.0 (cctv18/susfs4oki)
            Fixes vs v1.0:
            - `--page_size=4k` flag → vermagic agora termina em `-4k`
            - `CONFIG_MODULE_FORCE_LOAD=y` → bypass CRC mismatch dos vendor modules MTK
            - AnyKernel `block=boot` (rodin layout, era init_boot)
            - `do.devicecheck=0` (alinha com EVONIX, evita falsa rejeição)
          files: Revenant-Beta-*.zip
          prerelease: true
