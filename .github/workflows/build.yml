name: Build Revenant Kernel

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub release'
        required: false
        default: false
        type: boolean

env:
  KMI_BRANCH: common-android15-6.6
  KMI_TAG: android15-6.6.127_r00
  KSU_OWNER: KernelSU-Next
  KSU_REPO: KernelSU-Next
  # commit hash do KSU-Next "source: sync with upstream" (13/Mai/2026)
  # Kbuild hash fd31bb51 bate com base do patch cctv18 10_enable_susfs_for_ksu.patch
  KSU_COMMIT: 1d919700e46568436b993b57d3a8e3a3fd7f27b6
  SUSFS_OWNER: cctv18
  SUSFS_REPO: susfs4oki
  SUSFS_BRANCH: oki-android15-6.6
  KSU_VERSION_FORCED: 33150

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex libssl-dev make gcc \
            libelf-dev build-essential python3 python3-pip \
            zip unzip rsync cpio ccache lz4 zstd perl xz-utils
          mkdir -p "$HOME/bin"
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "ci"
          git config --global user.email "ci@local"

      - name: Sync AOSP manifest
        run: |
          mkdir -p ws && cd ws
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest \
            -b ${{ env.KMI_BRANCH }} -m default.xml
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --fail-fast

      - name: Pin common/ to ${{ env.KMI_TAG }}
        run: |
          cd ws/common
          git fetch https://android.googlesource.com/kernel/common.git \
            tag ${{ env.KMI_TAG }} --depth=1
          git checkout ${{ env.KMI_TAG }}
          head -5 Makefile
          grep KMI_GENERATION build.config.common

      - name: Clean scmversion dirty markers
        run: |
          cd ws
          sed -i 's/-dirty//g; s/ -dirty//g' common/scripts/setlocalversion
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' \
            build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true

      - name: Clone KernelSU-Next at commit ${{ env.KSU_COMMIT }}
        run: |
          cd ws
          git clone https://github.com/${{ env.KSU_OWNER }}/${{ env.KSU_REPO }}.git KernelSU-Next
          cd KernelSU-Next
          git checkout ${{ env.KSU_COMMIT }}
          echo "[+] KSU at $(git rev-parse --short HEAD): $(git log -1 --pretty=%s)"

      - name: Clone susfs4oki ${{ env.SUSFS_BRANCH }}
        run: |
          cd ws
          git clone --depth=1 -b ${{ env.SUSFS_BRANCH }} \
            https://github.com/${{ env.SUSFS_OWNER }}/${{ env.SUSFS_REPO }}.git susfs
          ls susfs/kernel_patches/

      - name: Apply cctv18 SuSFS kernel patch to common/
        run: |
          cd ws/common
          # patch traz susfs.h + susfs_def.h + fs/susfs.c embedded + hooks em fs/* e kernel/*
          # 1 hunk failed esperado em fs/proc/task_mmu.c (SUS_MAP) — tolera com --forward
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch \
            < ../susfs/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || \
            echo "[WARN] alguns hunks failed (esperado SUS_MAP) — continuar"
          # confirmar susfs.h foi criado
          ls -lh include/linux/susfs.h include/linux/susfs_def.h fs/susfs.c
          echo "[+] SuSFS source files presentes"

      - name: Apply cctv18 KSU patch to KSU source
        run: |
          cd ws/KernelSU-Next
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch \
            < ../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
          echo "[+] KSU SuSFS patch applied"
          if grep -q "^config KSU_SUSFS$" kernel/Kconfig; then
            echo "[OK] CONFIG_KSU_SUSFS present"
          fi

      - name: Force KSU_VERSION (sandbox Bazel loses .git)
        run: |
          cd ws/KernelSU-Next
          cat >> kernel/Kbuild <<EOF

          # Revenant: sandbox loses .git → fallback eh 1. Force versao real.
          ccflags-y += -DKSU_VERSION=${{ env.KSU_VERSION_FORCED }}
          ccflags-y += -DKSU_VERSION_TAG=\\"v3.2.0\\"
          EOF
          echo "[+] KSU_VERSION forçado = ${{ env.KSU_VERSION_FORCED }}"

      - name: Symlink KernelSU-Next into common/drivers
        run: |
          cd ws/common
          ln -sf ../../KernelSU-Next/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || \
            printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || \
            sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          echo "[+] KSU integrated"

      - name: Apply config fragment + LOCALVERSION
        run: |
          cp configs/revenant-base.fragment \
            ws/common/arch/arm64/configs/revenant.fragment
          cat >> ws/common/arch/arm64/configs/revenant.fragment <<'EOF'

          # Revenant LOCALVERSION (preserve android15-8-4k suffix)
          CONFIG_LOCALVERSION="-Revenant-Beta-v1.0"
          # CONFIG_LOCALVERSION_AUTO is not set
          EOF
          cat ws/common/arch/arm64/configs/revenant.fragment

      - name: Build kernel_aarch64 (full LTO)
        run: |
          cd ws
          tools/bazel build --lto=full \
            --defconfig_fragment=//common:arch/arm64/configs/revenant.fragment \
            //common:kernel_aarch64_dist 2>&1 | tail -80
          mkdir -p "$GITHUB_WORKSPACE/dist"
          IMG=$(find -L bazel-bin -name Image -path '*kernel_aarch64*' | head -1)
          test -n "$IMG"
          cp -v "$IMG" "$GITHUB_WORKSPACE/dist/Image"
          echo "=== banner ==="
          strings "$GITHUB_WORKSPACE/dist/Image" | grep "^Linux version" | head -1
          echo "=== KSU + SuSFS strings ==="
          strings "$GITHUB_WORKSPACE/dist/Image" | grep -E "KSU_VERSION|SUSFS_VERSION|susfs is initialized" | head -3

      - name: Package AnyKernel3
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
          rm -rf ak3/.git ak3/README.md
          cat > ak3/anykernel.sh <<'EOF'
          ### AnyKernel3 — Revenant
          properties() { '
          kernel.string=Revenant Kernel by Kaua
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=rodin
          device.name2=24129RT7CC
          supported.versions=15-16
          '; }
          block=init_boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          no_magisk_check=1;
          . tools/ak3-core.sh;
          dump_boot;
          write_boot;
          EOF
          cp dist/Image ak3/Image
          cd ak3
          zip -r9 "../Revenant-Beta-v1.0-${{ github.run_number }}.zip" * -x .git
          cd ..
          ls -lh Revenant-Beta-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Revenant-Beta-v1.0-${{ github.run_number }}
          path: |
            Revenant-Beta-*.zip
            dist/Image
          retention-days: 30

      - name: Create release
        if: ${{ inputs.release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Beta-v1.0
          name: Revenant Beta v1.0
          body: |
            Build #${{ github.run_number }}
            Base: Linux 6.6.127 `android15-8-4k`
            KernelSU-Next + SuSFS v2.1.0 (cctv18/susfs4oki)
          files: Revenant-Beta-*.zip
          prerelease: true
