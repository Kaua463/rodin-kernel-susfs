name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      ksu_branch:
        description: "KernelSU-Next branch"
        default: "next"
      susfs_branch:
        description: "SuSFS branch"
        default: "gki-android15-6.6"
  push:
    paths:
      - ".github/workflows/build.yml"
      - "rodin.fragment"

env:
  GKI_MANIFEST_BRANCH: common-android15-6.6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex libssl-dev make gcc \
            libelf-dev build-essential python3 python3-pip \
            zip unzip rsync cpio ccache lz4 zstd perl
          mkdir -p "$HOME/bin"
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "ci"
          git config --global user.email "ci@local"

      - name: Sync GKI source
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b "${GKI_MANIFEST_BRANCH}"
          repo sync -c -j"$(nproc)" --no-tags --no-clone-bundle --fail-fast

      - name: Clean dirty flags
        run: |
          cd kernel_workspace
          sed -i 's/-dirty//g' common/scripts/setlocalversion || true
          sed -i 's/ -dirty//g' common/scripts/setlocalversion || true
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kleaf/impl/stamp.bzl 2>/dev/null || true

      - name: Remove GKI protected exports
        run: |
          cd kernel_workspace
          rm -rf common/android/abi_gki_protected_exports_* || true
          # remove the BUILD.bazel reference so bazel doesn't require the deleted file
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' common/BUILD.bazel
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_x86_64",\s*$//;'   common/BUILD.bazel
          ! grep -q '"protected_exports_list"[[:space:]]*:[[:space:]]*"android/abi_gki_protected_exports' common/BUILD.bazel

      - name: Integrate KernelSU-Next
        run: |
          cd kernel_workspace
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${{ github.event.inputs.ksu_branch || 'next' }}/kernel/setup.sh" | bash -s "${{ github.event.inputs.ksu_branch || 'next' }}"
          ls -la KernelSU-Next || true

      - name: Apply SuSFS (kernel side)
        run: |
          cd kernel_workspace
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b "${{ github.event.inputs.susfs_branch || 'gki-android15-6.6' }}"
          cp -v susfs4ksu/kernel_patches/fs/* common/fs/
          cp -v susfs4ksu/kernel_patches/include/linux/* common/include/linux/
          cd common
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || \
          patch -p1 --fuzz=3 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch

      - name: Place config fragment
        run: |
          cd kernel_workspace
          cp "$GITHUB_WORKSPACE/rodin.fragment" common/arch/arm64/configs/rodin.fragment
          echo "=== fragment ==="; cat common/arch/arm64/configs/rodin.fragment

      - name: Build (Kleaf)
        run: |
          cd kernel_workspace
          tools/bazel build --config=fast \
            --defconfig_fragment=//common:arch/arm64/configs/rodin.fragment \
            //common:kernel_aarch64
          mkdir -p "$GITHUB_WORKSPACE/out_dist"
          IMG=$(find -L bazel-bin -name Image -path '*kernel_aarch64*' | head -1)
          [ -z "$IMG" ] && IMG=$(find -L bazel-bin -name Image | head -1)
          echo "Found Image: $IMG"
          test -n "$IMG"
          cp -v "$IMG" "$GITHUB_WORKSPACE/out_dist/Image"
          # also grab boot.img if kleaf produced one
          for b in $(find -L bazel-bin -name 'boot*.img' 2>/dev/null); do cp -v "$b" "$GITHUB_WORKSPACE/out_dist/"; done || true
          ls -la "$GITHUB_WORKSPACE/out_dist/"

      - name: Compress kernel image
        run: |
          cd "$GITHUB_WORKSPACE/out_dist"
          test -f Image
          lz4 -9 -f Image Image.lz4
          ls -la

      - name: Get magiskboot
        run: |
          cd "$GITHUB_WORKSPACE"
          MAGISK_VER=$(curl -sSL https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "Magisk $MAGISK_VER"
          curl -sSL -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/${MAGISK_VER}/Magisk-${MAGISK_VER}.apk"
          unzip -o magisk.apk "lib/x86_64/libmagiskboot.so" -d magisk_extract
          cp magisk_extract/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: Repack boot.img
        run: |
          cd "$GITHUB_WORKSPACE"
          test -f stock_boot.img
          mkdir -p repack && cd repack
          cp ../stock_boot.img boot.img
          ../magiskboot unpack boot.img
          cp ../out_dist/Image kernel
          ../magiskboot repack boot.img boot_new.img
          mv boot_new.img ../boot_new.img
          cd ..
          ls -la boot_new.img
          ../magiskboot 2>/dev/null || true

      - name: Package AnyKernel3
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
          rm -rf ak3/.git
          cp out_dist/Image ak3/Image
          cat > ak3/anykernel.sh <<'AK3'
          properties() { '
          kernel.string=rodin-kernel-susfs
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=1
          device.name1=rodin
          device.name2=POCO X7 Pro
          supported.versions=
          supported.patchlevels=
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_generic kernel;
          write_boot;
          AK3
          cd ak3 && zip -r9 "../AnyKernel3-rodin.zip" . -x .git && cd ..
          ls -la AnyKernel3-rodin.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rodin-kernel-${{ github.run_number }}
          path: |
            out_dist/Image
            out_dist/Image.lz4
            boot_new.img
            AnyKernel3-rodin.zip
          if-no-files-found: warn
          retention-days: 14
