name: Build vendor kernel (rodin)

# Builds a kernel from Xiaomi's bsp-rodin-v-oss source (which has all MTK patches)
# + KernelSU-Next + SuSFS. This produces a rodin-specific kernel with working WiFi.

on:
  workflow_dispatch:
    inputs:
      ksu_branch:
        description: "pershoot KSU-Next branch (has susfs integrated)"
        default: "next-susfs"

env:
  GKI_MANIFEST_BRANCH: common-android15-6.6
  XIAOMI_BRANCH: bsp-rodin-v-oss

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex libssl-dev make gcc \
            libelf-dev build-essential python3 python3-pip \
            zip unzip rsync cpio ccache lz4 zstd perl
          mkdir -p "$HOME/bin"
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "ci"
          git config --global user.email "ci@local"

      - name: Sync GKI build infrastructure
        run: |
          mkdir -p ws && cd ws
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b "${GKI_MANIFEST_BRANCH}"
          # sync everything EXCEPT common/ (we'll replace it with Xiaomi source)
          repo sync -c -j"$(nproc)" --no-tags --no-clone-bundle --fail-fast

      - name: Replace common/ with Xiaomi rodin source
        run: |
          cd ws
          rm -rf common
          git clone --depth=1 -b "${XIAOMI_BRANCH}" https://github.com/MiCode/Xiaomi_Kernel_OpenSource common
          echo "=== Xiaomi kernel version ==="
          head -6 common/Makefile

      - name: Clean dirty flags
        run: |
          cd ws
          sed -i 's/-dirty//g; s/ -dirty//g' common/scripts/setlocalversion || true
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kleaf/impl/stamp.bzl 2>/dev/null || true

      - name: Remove protected exports
        run: |
          cd ws
          rm -rf common/android/abi_gki_protected_exports_* || true
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' common/BUILD.bazel
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_x86_64",\s*$//;'   common/BUILD.bazel
          ! grep -q '"protected_exports_list".*"android/abi_gki_protected_exports' common/BUILD.bazel

      - name: Integrate Wild_KSU (canary - susfs-compatible signatures)
        run: |
          cd ws
          # Wild_KSU has core_hook.c with signatures matching simonpunk susfs4ksu v2.1.0.
          # This is the combo used by ahmed-alnassif/GKI-Duchamp (proven working for MTK).
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/canary/kernel/setup.sh" | bash -s canary
          # the setup creates KernelSU-Next/ symlink; the dir is Wild_KSU though
          ls -la KernelSU-Next Wild_KSU 2>&1 | head
          # download manager_hash.patch (lets the standard KSU-Next manager work with Wild_KSU)
          curl -sSL -o /tmp/manager_hash.patch "https://raw.githubusercontent.com/ahmed-alnassif/GKI-Duchamp/main/patches/manager_hash.patch"
          for D in Wild_KSU KernelSU-Next; do
            if [ -d "$D" ]; then
              ( cd "$D" && patch -p1 --fuzz=3 < /tmp/manager_hash.patch ) || true
              break
            fi
          done

      - name: Apply SuSFS kernel-side patch
        run: |
          cd ws
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6
          cp -v susfs4ksu/kernel_patches/fs/* common/fs/
          cp -v susfs4ksu/kernel_patches/include/linux/* common/include/linux/
          # SINGLE patch invocation with --fuzz=3 and --forward (skip already-applied hunks).
          # No chained fallback — that was double-applying and causing duplicate labels.
          cd common
          set +e
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch
          set -e
          REJ=$(find . -name '*.rej' 2>/dev/null)
          echo "=== rejected hunks (will try fallbacks) ==="
          for r in $REJ; do echo "--- $r ---"; cat "$r"; done
          # FALLBACK 1: if fs/namespace.c.rej, apply GKI-Duchamp's minimal fs_namespace patch (adds extern decls)
          if [ -f ./fs/namespace.c.rej ]; then
            echo "applying GKI-Duchamp fs_namespace.patch fallback"
            curl -sSL -o /tmp/fs_namespace.patch "https://raw.githubusercontent.com/ahmed-alnassif/GKI-Duchamp/main/kernel-patches/susfs/fs_namespace.patch"
            # the patch is from a different repo so it might need different -p strip
            patch -p1 --fuzz=3 --forward --no-backup-if-mismatch < /tmp/fs_namespace.patch ||               patch -p2 --fuzz=3 --forward --no-backup-if-mismatch < /tmp/fs_namespace.patch || true
            rm -f ./fs/namespace.c.rej
          fi
          # FALLBACK 2: task_mmu.c rej is acceptable (SUS_MAP feature, we don't enable it)
          [ -f ./fs/proc/task_mmu.c.rej ] && rm ./fs/proc/task_mmu.c.rej
          # any remaining rej is critical
          REMAINING=$(find . -name '*.rej' 2>/dev/null)
          if [ -n "$REMAINING" ]; then
            echo "::error::unresolved .rej files:"
            for r in $REMAINING; do echo "--- $r ---"; cat "$r"; done
            exit 1
          fi
          # NUCLEAR FIX: inject unconditional declarations at top of namespace.c via awk
          if ! grep -q 'RODIN_SUSFS_UNCOND' fs/namespace.c; then
            awk '
              /^#include "internal.h"$/ && !done {
                print
                print "/* RODIN_SUSFS_UNCOND */"
                print "#include <linux/susfs_def.h>"
                print "#ifndef CL_COPY_MNT_NS"
                print "#define CL_COPY_MNT_NS BIT(25)"
                print "#endif"
                print "extern bool susfs_is_current_ksu_domain(void);"
                print "extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;"
                print "extern struct static_key_true ksu_su_compat_enabled;"
                print "/* END RODIN_SUSFS_UNCOND */"
                done=1
                next
              }
              { print }
            ' fs/namespace.c > /tmp/ns.c && mv /tmp/ns.c fs/namespace.c
            echo "injected RODIN_SUSFS_UNCOND via awk"
          fi
          grep -n "RODIN_SUSFS_UNCOND\|susfs_def.h\|CL_COPY_MNT_NS" fs/namespace.c | head -10
          # ---- POST-PATCH SOURCE SURGERY ----
          # Don't touch selinuxfs.c - the susfs patch adds proper prototypes.
          # Just provide stub implementations for symbols Xiaomi vendor kernel
          # and Wild_KSU don't define. The stubs delegate where possible.
          if [ ! -f fs/rodin_ksu_stubs.c ]; then
            cat > fs/rodin_ksu_stubs.c <<'STUBEOF'
          #include <linux/jump_label.h>
          #include <linux/export.h>
          #include <linux/types.h>
          #include <linux/gfp.h>

          /* === Wild_KSU missing symbol === */
          DEFINE_STATIC_KEY_FALSE(ksu_is_init_rc_hook_enabled);
          EXPORT_SYMBOL_GPL(ksu_is_init_rc_hook_enabled);
          DEFINE_STATIC_KEY_FALSE(ksu_is_input_hook_enabled);
          EXPORT_SYMBOL_GPL(ksu_is_input_hook_enabled);
          /* ksu_handle_sys_read is defined by Wild_KSU/kernel/ksud.c, do not duplicate */

          /* ksu_selinux_hide_running: bool used by my_write_* in selinuxfs.c.
           * Default false = don't hide. SuSFS configures via separate prctl path.
           */
          bool ksu_selinux_hide_running __read_mostly = false;
          EXPORT_SYMBOL_GPL(ksu_selinux_hide_running);

          /* backup_sepolicy: susfs's backup selinux_policy pointer. Null in our build. */
          struct selinux_policy *backup_sepolicy = NULL;
          EXPORT_SYMBOL_GPL(backup_sepolicy);

          /* susfs_run_sus_path_loop: defined as static in susfs.c, but referenced
           * externally by patch. No-op here — SUS_PATH_LOOP feature not used.
           */
          void susfs_run_sus_path_loop(void) {}
          EXPORT_SYMBOL_GPL(susfs_run_sus_path_loop);

          /* === SELinux _with_policy stubs ===
           * Xiaomi's vendor kernel is older and doesn't export the *_with_policy
           * variants. We delegate to the non-_with_policy versions, ignoring the
           * policy arg (the susfs interface only cares about the default policy).
           */
          struct selinux_policy;
          struct av_decision;
          extern int security_context_to_sid(const char *scontext, u32 scontext_len,
                                             u32 *sid, gfp_t gfp);
          extern int security_sid_to_context(u32 sid, char **scontext, u32 *scontext_len);
          extern int security_compute_av_user(u32 ssid, u32 tsid, u16 tclass,
                                              struct av_decision *avd);

          int security_context_to_sid_with_policy(struct selinux_policy *policy,
                  const char *scontext, u32 scontext_len, u32 *sid, u32 def_sid,
                  gfp_t gfp_flags)
          {
                  (void)policy; (void)def_sid;
                  return security_context_to_sid(scontext, scontext_len, sid, gfp_flags);
          }
          EXPORT_SYMBOL_GPL(security_context_to_sid_with_policy);

          int security_sid_to_context_with_policy(struct selinux_policy *policy,
                  u32 sid, char **scontext, u32 *scontext_len)
          {
                  (void)policy;
                  return security_sid_to_context(sid, scontext, scontext_len);
          }
          EXPORT_SYMBOL_GPL(security_sid_to_context_with_policy);

          int security_compute_av_user_with_policy(struct selinux_policy *policy,
                  u32 ssid, u32 tsid, u16 tclass, struct av_decision *avd)
          {
                  (void)policy;
                  return security_compute_av_user(ssid, tsid, tclass, avd);
          }
          EXPORT_SYMBOL_GPL(security_compute_av_user_with_policy);
          STUBEOF
            grep -q "rodin_ksu_stubs" fs/Makefile || echo "obj-y += rodin_ksu_stubs.o" >> fs/Makefile
            echo "added rodin_ksu_stubs.c"
          fi
          echo "=== sanity ==="
          ls -la fs/rodin_ksu_stubs.c
          head -3 fs/rodin_ksu_stubs.c
          tail -2 fs/Makefile
          # sanity: confirm key symbols present
          grep -n "susfs_is_current_ksu_domain\|susfs_is_sdcard_android_data_not_decrypted" fs/namespace.c | head -5
          grep -n "bypass_orig_flow" fs/namespace.c | head -5

      - name: Place config fragment
        run: |
          cd ws
          cp "$GITHUB_WORKSPACE/rodin.fragment" common/arch/arm64/configs/rodin.fragment
          cat common/arch/arm64/configs/rodin.fragment

      - name: Build (Kleaf)
        run: |
          cd ws
          tools/bazel build --config=fast \
            --defconfig_fragment=//common:arch/arm64/configs/rodin.fragment \
            //common:kernel_aarch64 2>&1 | tail -50
          mkdir -p "$GITHUB_WORKSPACE/out_dist"
          IMG=$(find -L bazel-bin -name Image -path '*kernel_aarch64*' | head -1)
          [ -z "$IMG" ] && IMG=$(find -L bazel-bin -name Image | head -1)
          echo "Found Image: $IMG"
          test -n "$IMG"
          cp -v "$IMG" "$GITHUB_WORKSPACE/out_dist/Image"
          ls -la "$GITHUB_WORKSPACE/out_dist/"

      - name: Get magiskboot + repack
        run: |
          cd "$GITHUB_WORKSPACE"
          MAGISK_VER=$(curl -sSL https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          curl -sSL -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/${MAGISK_VER}/Magisk-${MAGISK_VER}.apk"
          unzip -o magisk.apk "lib/x86_64/libmagiskboot.so" -d magisk_extract
          cp magisk_extract/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot
          mkdir repack && cd repack
          cp ../stock_boot.img boot.img
          ../magiskboot unpack boot.img
          cp ../out_dist/Image kernel
          ../magiskboot repack boot.img boot_new.img
          mv boot_new.img ../boot_new_vendor.img
          cd ..
          ls -la boot_new_vendor.img
          strings boot_new_vendor.img | grep -m1 "Linux version" || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vendor-${{ github.run_number }}
          path: |
            out_dist/Image
            boot_new_vendor.img
          retention-days: 14
