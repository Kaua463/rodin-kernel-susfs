name: Build PINNED to stock commit (last attempt)

# Pin to EXACT git commit of stock kernel for ABI byte-identical match.
# Stock kernel commit: 8e4be6b47e400d66198bf437576a37b8ba1cd79a (Aug 07 2025)
# This is supposed to give vendor modules max compatibility.

on:
  workflow_dispatch:

env:
  STOCK_COMMIT: 8e4be6b47e400d66198bf437576a37b8ba1cd79a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex libssl-dev make gcc \
            libelf-dev build-essential python3 python3-pip \
            zip unzip rsync cpio ccache lz4 zstd perl
          mkdir -p "$HOME/bin"
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.name "ci"
          git config --global user.email "ci@local"

      - name: Sync GKI manifest at default head (build infra)
        run: |
          mkdir -p ws && cd ws
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6
          repo sync -c -j"$(nproc)" --no-tags --no-clone-bundle --fail-fast

      - name: Checkout common/ at EXACT stock commit
        run: |
          cd ws/common
          git remote -v
          git fetch origin "${STOCK_COMMIT}" --depth=1
          git checkout "${STOCK_COMMIT}"
          echo "=== now at stock commit ==="
          git log -1 --oneline
          head -6 Makefile

      - name: Clean dirty + protected exports
        run: |
          cd ws
          sed -i 's/-dirty//g; s/ -dirty//g' common/scripts/setlocalversion || true
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          rm -rf common/android/abi_gki_protected_exports_* || true
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' common/BUILD.bazel
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_x86_64",\s*$//;' common/BUILD.bazel

      - name: Integrate Wild_KSU + SuSFS (proven recipe)
        run: |
          cd ws
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/canary/kernel/setup.sh" | bash -s canary
          curl -sSL -o /tmp/manager_hash.patch "https://raw.githubusercontent.com/ahmed-alnassif/GKI-Duchamp/main/patches/manager_hash.patch"
          ( cd Wild_KSU && patch -p1 --fuzz=3 < /tmp/manager_hash.patch ) || true
          # susfs kernel-side
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6
          cp -v susfs4ksu/kernel_patches/fs/* common/fs/
          cp -v susfs4ksu/kernel_patches/include/linux/* common/include/linux/
          cd common
          set +e
          patch -p1 --fuzz=3 --forward --no-backup-if-mismatch < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch
          set -e
          # apply fs_namespace fallback
          [ -f ./fs/namespace.c.rej ] && {
            curl -sSL -o /tmp/fs_namespace.patch "https://raw.githubusercontent.com/ahmed-alnassif/GKI-Duchamp/main/kernel-patches/susfs/fs_namespace.patch"
            patch -p1 --fuzz=3 --forward --no-backup-if-mismatch < /tmp/fs_namespace.patch || true
            rm -f ./fs/namespace.c.rej
          }
          # nuke task_mmu rej (SUS_MAP not needed)
          [ -f ./fs/proc/task_mmu.c.rej ] && rm ./fs/proc/task_mmu.c.rej
          # inject unconditional susfs decls into namespace.c
          if ! grep -q 'RODIN_SUSFS_UNCOND' fs/namespace.c; then
            awk '
              /^#include "internal.h"$/ && !done {
                print
                print "/* RODIN_SUSFS_UNCOND */"
                print "#include <linux/susfs_def.h>"
                print "#ifndef CL_COPY_MNT_NS"
                print "#define CL_COPY_MNT_NS BIT(25)"
                print "#endif"
                print "extern bool susfs_is_current_ksu_domain(void);"
                print "extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;"
                print "extern struct static_key_true ksu_su_compat_enabled;"
                print "/* END RODIN_SUSFS_UNCOND */"
                done=1
                next
              }
              { print }
            ' fs/namespace.c > /tmp/ns.c && mv /tmp/ns.c fs/namespace.c
          fi
          # stubs file for missing symbols
          if [ ! -f fs/rodin_ksu_stubs.c ]; then
            cat > fs/rodin_ksu_stubs.c <<'STUBEOF'
          #include <linux/jump_label.h>
          #include <linux/export.h>
          #include <linux/types.h>
          #include <linux/gfp.h>
          DEFINE_STATIC_KEY_FALSE(ksu_is_init_rc_hook_enabled);
          EXPORT_SYMBOL_GPL(ksu_is_init_rc_hook_enabled);
          DEFINE_STATIC_KEY_FALSE(ksu_is_input_hook_enabled);
          EXPORT_SYMBOL_GPL(ksu_is_input_hook_enabled);
          bool ksu_selinux_hide_running __read_mostly = false;
          EXPORT_SYMBOL_GPL(ksu_selinux_hide_running);
          struct selinux_policy *backup_sepolicy = NULL;
          EXPORT_SYMBOL_GPL(backup_sepolicy);
          void susfs_run_sus_path_loop(void) {}
          EXPORT_SYMBOL_GPL(susfs_run_sus_path_loop);
          struct selinux_policy;
          struct av_decision;
          extern int security_context_to_sid(const char *scontext, u32 scontext_len, u32 *sid, gfp_t gfp);
          extern int security_sid_to_context(u32 sid, char **scontext, u32 *scontext_len);
          extern int security_compute_av_user(u32 ssid, u32 tsid, u16 tclass, struct av_decision *avd);
          int security_context_to_sid_with_policy(struct selinux_policy *p, const char *s, u32 l, u32 *sid, u32 d, gfp_t g) { (void)p;(void)d; return security_context_to_sid(s,l,sid,g); }
          EXPORT_SYMBOL_GPL(security_context_to_sid_with_policy);
          int security_sid_to_context_with_policy(struct selinux_policy *p, u32 s, char **c, u32 *l) { (void)p; return security_sid_to_context(s,c,l); }
          EXPORT_SYMBOL_GPL(security_sid_to_context_with_policy);
          int security_compute_av_user_with_policy(struct selinux_policy *p, u32 s, u32 t, u16 c, struct av_decision *a) { (void)p; return security_compute_av_user(s,t,c,a); }
          EXPORT_SYMBOL_GPL(security_compute_av_user_with_policy);
          STUBEOF
            grep -q "rodin_ksu_stubs" fs/Makefile || echo "obj-y += rodin_ksu_stubs.o" >> fs/Makefile
          fi

      - name: Config fragment
        run: |
          cd ws
          cat > common/arch/arm64/configs/rodin.fragment <<EOF
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_NET_SCH_CAKE=y
          EOF

      - name: Build (Kleaf)
        run: |
          cd ws
          tools/bazel build --config=fast \
            --defconfig_fragment=//common:arch/arm64/configs/rodin.fragment \
            //common:kernel_aarch64 2>&1 | tail -30
          mkdir -p "$GITHUB_WORKSPACE/out_dist"
          IMG=$(find -L bazel-bin -name Image -path '*kernel_aarch64*' | head -1)
          [ -z "$IMG" ] && IMG=$(find -L bazel-bin -name Image | head -1)
          test -n "$IMG"
          cp -v "$IMG" "$GITHUB_WORKSPACE/out_dist/Image"

      - name: Repack
        run: |
          cd "$GITHUB_WORKSPACE"
          MAGISK_VER=$(curl -sSL https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          curl -sSL -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/${MAGISK_VER}/Magisk-${MAGISK_VER}.apk"
          unzip -o magisk.apk "lib/x86_64/libmagiskboot.so" -d magisk_extract
          cp magisk_extract/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot
          mkdir repack && cd repack
          cp ../stock_boot.img boot.img
          ../magiskboot unpack boot.img
          cp ../out_dist/Image kernel
          ../magiskboot repack boot.img boot_new.img
          mv boot_new.img ../boot_new_pinned.img
          cd ..
          ls -la boot_new_pinned.img
          strings boot_new_pinned.img | grep -m1 "Linux version" || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pinned-${{ github.run_number }}
          path: |
            boot_new_pinned.img
            out_dist/Image
          retention-days: 14
